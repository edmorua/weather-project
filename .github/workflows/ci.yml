name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  api:
    name: API — lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint API
        working-directory: apps/api
        run: npm run lint --if-present
      - name: Unit tests
        working-directory: apps/api
        run: npm test -- --ci --runInBand
      - name: E2E tests (mongodb-memory-server + mocked fetch)
        working-directory: apps/api
        run: npm run test:e2e
      - name: Build
        working-directory: apps/api
        run: npm run build

  web:
    name: Web — lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint web
        working-directory: apps/web
        run: npm run lint --if-present
      - name: Unit tests (Vitest)
        working-directory: apps/web
        run: npm test
      - name: Build
        working-directory: apps/web
        run: npm run build

  docker:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t palmetto-weather-api .
      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t palmetto-weather-web .
