name: Cypress E2E

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  cypress:
    name: Cypress (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build web
        working-directory: apps/web
        run: npm run build
      - name: Run Cypress against the built preview server
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/web
          start: npm run preview
          wait-on: 'http://localhost:4173'
          wait-on-timeout: 60
          browser: chrome
