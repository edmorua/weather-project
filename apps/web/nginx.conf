server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA — fall through to index.html so client-side routing works on refresh.
  location / {
    try_files $uri /index.html;
  }

  # Cache hashed assets aggressively; everything else stays revalidated.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
