services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 3001
      MONGO_URI: mongodb://mongo:27017/palmetto-weather
      CORS_ORIGIN: http://localhost:8080
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      WEATHER_CACHE_TTL_SECONDS: '600'
    ports:
      - '3001:3001'
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  mongo-data:
